<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <title>Loader</title>
</head>

<body>

    <div id="loaderOverlay" class="d-none position-fixed top-0 start-0 w-100 h-100 
            bg-white d-flex justify-content-center align-items-center" style="opacity: 0.8;">
        <div class="progress w-50" style="height: 6px;">
            <div id="progressBar" class="progress-bar bg-danger"></div>
        </div>
    </div>

    <div class="container vh-100 d-flex flex-column justify-content-center align-items-center">
        <p id="myText" class="my-5 transition fs-3">Lorem ipsum dolor sit amet.</p>
        <div class="mt-4 d-flex gap-5">
            <button id="actionBtn" class="btn btn-success me-5 px-2">Action</button>
            <button id="resetBtn" class="btn btn-danger px-2">Reset</button>
        </div>
    </div>




    <script src="index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

</body>

</html>
